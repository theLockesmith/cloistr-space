apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloistr-space
  namespace: cloistr
  labels:
    app: cloistr-space
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloistr-space
  template:
    metadata:
      labels:
        app: cloistr-space
    spec:
      containers:
        - name: cloistr-space
          image: registry.coldforge.xyz/coldforge/cloistr-space:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_RELAY_URL
              value: "wss://relay.cloistr.xyz"
            - name: VITE_SIGNER_URL
              value: "https://signer.cloistr.xyz"
            - name: VITE_DRIVE_API
              value: "https://drive-api.cloistr.xyz"
            - name: VITE_BLOSSOM_API
              value: "https://files.cloistr.xyz"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      imagePullSecrets:
        - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: cloistr-space
  namespace: cloistr
spec:
  selector:
    app: cloistr-space
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloistr-space
  namespace: cloistr
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - space.cloistr.xyz
      secretName: cloistr-space-tls
  rules:
    - host: space.cloistr.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloistr-space
                port:
                  number: 80
