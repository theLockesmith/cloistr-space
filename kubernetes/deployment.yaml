apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloistr-space
  namespace: cloistr
  labels:
    app: cloistr-space
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloistr-space
  template:
    metadata:
      labels:
        app: cloistr-space
    spec:
      containers:
        - name: cloistr-space
          image: registry.aegis-hq.xyz/coldforge/cloistr-space:latest
          ports:
            - containerPort: 8080
              name: http
          # Note: VITE_ variables are build-time only
          # Service URLs are baked into the build via environment.ts defaults
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      imagePullSecrets:
        - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: cloistr-space
  namespace: cloistr
spec:
  selector:
    app: cloistr-space
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloistr-space
  namespace: cloistr
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - space.cloistr.xyz
      secretName: cloistr-space-tls
  rules:
    - host: space.cloistr.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloistr-space
                port:
                  number: 80
